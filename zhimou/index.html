<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智眸 Zero-UI 测试端</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #000; overflow: hidden;}
        #touch-area { flex: 1; background-color: #ff4757; color: white; font-size: 2em; border: none; font-weight: bold; }
        #log-panel { height: 150px; background-color: #2f3542; color: #7bed9f; padding: 15px; font-size: 14px; overflow-y: auto; font-family: monospace;}
        video, canvas { display: none; }
    </style>
</head>
<body>
    <button id="touch-area">点击开启扫描</button>
    <div id="log-panel">系统就绪，等待点击...<br></div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const touchArea = document.getElementById('touch-area');
        const logPanel = document.getElementById('log-panel');

        function log(msg) { logPanel.innerHTML += msg + '<br>'; logPanel.scrollTop = logPanel.scrollHeight; }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
                log("✅ 摄像头加载成功！");
            })
            .catch(err => log("❌ 摄像头权限获取失败，请允许浏览器使用摄像头！"));

        function captureAndCompress() {
            canvas.width = 320; 
            canvas.height = (video.videoHeight / video.videoWidth) * 320 || 320;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.3); 
        }

        async function sendToCloud() {
            const base64Img = captureAndCompress();
            log("🚀 已压缩完毕，发送云端处理...");

            try {
                // 🌟 核心修改点：这里去掉了 127.0.0.1，变成了相对路径
                const response = await fetch('/api/v1/vision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_base64: base64Img })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let sentenceBuffer = ""; 

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunkStr = decoder.decode(value);
                    const lines = chunkStr.split('\n');
                    
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.replace('data: ', '').trim();
                            if (dataStr === '[DONE]') continue;
                            
                            const data = JSON.parse(dataStr);
                            
                            if (data.type === 'text') {
                                sentenceBuffer += data.content;
                                touchArea.innerText = sentenceBuffer; 
                                if (/[。！？，]/.test(data.content)) {
                                    log("🔊 语音播报: " + sentenceBuffer);
                                    let utterance = new SpeechSynthesisUtterance(sentenceBuffer);
                                    utterance.rate = 1.3;
                                    window.speechSynthesis.speak(utterance);
                                    sentenceBuffer = ""; 
                                }
                            }
                            
                            if (data.type === 'vibration') {
                                log(`📳 触发雷达马达！震感级别: Level ${data.level}`);
                                if (navigator.vibrate) {
                                    if (data.level >= 8) navigator.vibrate([100, 50, 100, 50, 200]);
                                    else if (data.level >= 4) navigator.vibrate([200, 100, 200]);
                                    else navigator.vibrate([100]);
                                }
                            }
                        }
                    }
                }
            } catch (err) {
                log("❌ 网络异常，请确认后端服务已启动。");
            }
        }

        touchArea.addEventListener('click', () => {
            touchArea.style.backgroundColor = '#2ed573';
            if (navigator.vibrate) navigator.vibrate(50); 
            
            let initVoice = new SpeechSynthesisUtterance("雷达已启动");
            window.speechSynthesis.speak(initVoice);
            
            sendToCloud();
            setTimeout(() => { touchArea.style.backgroundColor = '#ff4757'; }, 1000);
        });
    </script>
</body>
</html>
